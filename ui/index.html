<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BMA Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #07090c;
  --surface:     #0d1117;
  --surface2:    #131920;
  --border:      #1c2330;
  --border2:     #21293a;
  --accent:      #f46d2f;
  --accent-dim:  rgba(244, 109, 47, 0.10);
  --text:        #c9d1d9;
  --text-dim:    #6b7785;
  --text-bright: #f0f6fc;
  --alarm:       #f85149;
  --alarm-dim:   rgba(248, 81, 73, 0.10);
  --trouble:     #d29922;
  --trouble-dim: rgba(210, 153, 34, 0.10);
  --normal:      #3fb950;
  --normal-dim:  rgba(63, 185, 80, 0.10);
  --scrollbar:   #1c2330;
}

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

body {
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.72);
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  backdrop-filter: blur(2px);
}

body.visible { display: flex; }

/* ───────────── MDT SHELL ───────────── */
.mdt {
  width: 90vw;
  max-width: 1440px;
  height: 84vh;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-top: 2px solid var(--accent);
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(244,109,47,0.08),
    0 32px 80px rgba(0,0,0,0.92);
  animation: mdtOpen 0.18s ease-out;
}

@keyframes mdtOpen {
  from { opacity: 0; transform: translateY(-12px) scale(0.985); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}

/* ───────────── HEADER ───────────── */
.mdt-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 13px;
}

.brand-flame { font-size: 22px; line-height: 1; }

.brand-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.brand-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 1.5px;
  margin-top: 3px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.clock {
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px;
  color: var(--text-dim);
  letter-spacing: 2px;
  padding-right: 16px;
  border-right: 1px solid var(--border2);
  margin-right: 4px;
}

.btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 13px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.2px;
  border-radius: 2px;
  border: 1px solid var(--border2);
  cursor: pointer;
  transition: all 0.12s;
  background: transparent;
  color: var(--text-dim);
  text-transform: uppercase;
  user-select: none;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }

.btn-close:hover {
  border-color: var(--alarm);
  color: var(--alarm);
  background: var(--alarm-dim);
}

/* ───────────── BODY LAYOUT ───────────── */
.mdt-body {
  display: grid;
  grid-template-columns: 268px 1fr;
  flex: 1;
  overflow: hidden;
}

/* ───────────── LEFT: SYSTEM LIST ───────────── */
.systems-panel {
  background: var(--surface);
  border-right: 1px solid var(--border2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-title {
  padding: 13px 16px 11px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-title-count {
  font-family: 'Share Tech Mono', monospace;
  color: var(--accent);
  font-size: 13px;
}

.systems-list {
  overflow-y: auto;
  flex: 1;
}

.systems-list::-webkit-scrollbar { width: 3px; }
.systems-list::-webkit-scrollbar-track { background: transparent; }
.systems-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

.system-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s, border-color 0.1s;
  position: relative;
}

.system-item:hover { background: var(--surface2); }

.system-item.active                { background: var(--accent-dim);  border-left-color: var(--accent); }
.system-item.s-alarm               { border-left-color: var(--alarm); }
.system-item.s-alarm.active        { background: var(--alarm-dim); }
.system-item.s-trouble             { border-left-color: var(--trouble); }
.system-item.s-trouble.active      { background: var(--trouble-dim); }
.system-item.s-normal              { border-left-color: var(--normal); }

.s-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
}

.s-dot.alarm   { background: var(--alarm);   box-shadow: 0 0 5px var(--alarm); }
.s-dot.trouble { background: var(--trouble); box-shadow: 0 0 5px var(--trouble); }
.s-dot.normal  { background: var(--normal); }

@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(1.6); }
}
.s-dot.alarm { animation: dotPulse 0.9s ease-in-out infinite; }

.sys-item-info { flex: 1; min-width: 0; }

.sys-item-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sys-item-meta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 3px;
}

.s-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 6px;
  border-radius: 2px;
  border: 1px solid;
  flex-shrink: 0;
}

.s-badge.alarm   { background: var(--alarm-dim);   color: var(--alarm);   border-color: var(--alarm);   }
.s-badge.trouble { background: var(--trouble-dim); color: var(--trouble); border-color: var(--trouble); }
.s-badge.normal  { background: var(--normal-dim);  color: var(--normal);  border-color: var(--normal);  }

/* ───────────── RIGHT: DETAIL PANEL ───────────── */
.detail-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
  background: var(--surface);
  min-height: 68px;
}

.detail-name {
  font-size: 21px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 0.5px;
}

.detail-id {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 3px;
  letter-spacing: 1px;
}

.detail-actions { display: flex; align-items: center; gap: 10px; }

.detail-status-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 5px 13px;
  border-radius: 2px;
  border: 1px solid;
}

.quitt-btn {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 5px 13px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  border-radius: 2px;
  border: 1px solid var(--alarm);
  color: var(--alarm);
  background: var(--alarm-dim);
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
}

.quitt-btn:hover { background: rgba(248,81,73,0.2); }
.quitt-btn.show  { display: flex; }

/* ───────────── TABS ───────────── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border2);
  padding: 0 24px;
  background: var(--surface);
  flex-shrink: 0;
}

.tab-btn {
  padding: 9px 14px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  border-top: none; border-left: none; border-right: none;
  background: transparent;
  transition: all 0.12s;
  margin-bottom: -1px;
  text-transform: uppercase;
  user-select: none;
}

.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ───────────── CONTENT ───────────── */
.tab-pane {
  flex: 1;
  overflow-y: auto;
  padding: 18px 24px;
}

.tab-pane::-webkit-scrollbar { width: 3px; }
.tab-pane::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }
.tab-pane.hidden { display: none; }

/* ───────────── EMPTY STATE ───────────── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 10px;
  color: var(--text-dim);
  pointer-events: none;
}

.empty-icon { font-size: 36px; opacity: 0.25; }

.empty-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  opacity: 0.4;
}

/* ───────────── STATS BAR ───────────── */
.stats-bar {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 16px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  overflow: hidden;
}

.stat-cell {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 8px;
  border-right: 1px solid var(--border);
}

.stat-cell:last-child { border-right: none; }

.stat-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px;
  color: var(--text-bright);
  line-height: 1;
}

.stat-key {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-top: 4px;
  text-transform: uppercase;
}

/* ───────────── DEVICE GRID ───────────── */
.devices-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 9px;
}

.device-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 13px 14px;
  transition: border-color 0.12s;
}

.device-card:hover { border-color: var(--border); }

.device-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 9px;
}

.type-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 2px 7px;
  border-radius: 2px;
  border: 1px solid;
}

.tb-panel  { color: #60a5fa; border-color: rgba(96,165,250,0.35); background: rgba(96,165,250,0.07); }
.tb-smoke  { color: #c084fc; border-color: rgba(192,132,252,0.35); background: rgba(192,132,252,0.07); }
.tb-pull   { color: #fbbf24; border-color: rgba(251,191,36,0.35);  background: rgba(251,191,36,0.07);  }
.tb-siren  { color: var(--accent); border-color: rgba(244,109,47,0.35); background: rgba(244,109,47,0.07); }

.device-health-pct {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  font-weight: bold;
}

.device-zone {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 9px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hbar-track {
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}

.hbar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.45s ease;
}

.hc-good    { background: var(--normal); }
.hc-warn    { background: var(--trouble); }
.hc-danger  { background: var(--alarm); }

.device-svc {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 7px;
}

/* ───────────── ALARM LOG ───────────── */
.log-list { display: flex; flex-direction: column; gap: 7px; }

.log-entry {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 12px;
  align-items: start;
  padding: 11px 13px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  transition: border-color 0.1s;
}

.log-entry:hover { border-color: var(--border2); }

.log-icon { font-size: 17px; line-height: 1.5; text-align: center; }

.log-zone {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-bright);
}

.log-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.log-type {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 1px 6px;
  border-radius: 2px;
}

.lt-manual    { background: rgba(96,165,250,0.12); color: #60a5fa; }
.lt-automatic { background: rgba(192,132,252,0.12); color: #c084fc; }
.lt-test      { background: rgba(244,109,47,0.12); color: var(--accent); }

.log-ack {
  font-size: 10px;
  color: var(--text-dim);
}

.log-ack.acked { color: var(--normal); }

.log-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  text-align: right;
  white-space: nowrap;
  padding-top: 2px;
}

/* ───────────── SCANLINE OVERLAY ───────────── */
.mdt::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  border-radius: 3px;
}
</style>
</head>
<body id="body">

<div class="mdt">

  <!-- ── HEADER ─────────────────────────────────── -->
  <div class="mdt-header">
    <div class="header-brand">
      <div class="brand-flame">🔥</div>
      <div>
        <div class="brand-title">BMA&nbsp;&nbsp;Terminal</div>
        <div class="brand-sub">BRANDMELDE · MANAGEMENT · SYSTEM</div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <button class="btn" onclick="doRefresh()">↻&nbsp;AKTUALISIEREN</button>
      <button class="btn btn-close" onclick="closeMDT()">✕&nbsp;SCHLIESSEN</button>
    </div>
  </div>

  <!-- ── BODY ───────────────────────────────────── -->
  <div class="mdt-body">

    <!-- LEFT: System-Liste -->
    <div class="systems-panel">
      <div class="panel-title">
        <span>SYSTEME</span>
        <span class="panel-title-count" id="sys-count">0</span>
      </div>
      <div class="systems-list" id="systems-list"></div>
    </div>

    <!-- RIGHT: Detail-Ansicht -->
    <div class="detail-panel">

      <div class="detail-header">
        <div>
          <div class="detail-name"  id="d-name">Kein System ausgewählt</div>
          <div class="detail-id"   id="d-id">— Links ein System wählen —</div>
        </div>
        <div class="detail-actions">
          <div class="detail-status-badge" id="d-badge"></div>
          <button class="quitt-btn" id="btn-quitt" onclick="doQuittieren()">⊘&nbsp;QUITTIEREN</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tb-devices" onclick="switchTab('devices')">GERÄTE</button>
        <button class="tab-btn"        id="tb-logs"    onclick="switchTab('logs')">ALARM-LOG</button>
      </div>

      <div class="tab-pane" id="pane-devices">
        <div class="empty">
          <div class="empty-icon">🖥</div>
          <div class="empty-label">Kein System ausgewählt</div>
        </div>
      </div>

      <div class="tab-pane hidden" id="pane-logs">
        <div class="empty">
          <div class="empty-icon">📋</div>
          <div class="empty-label">Kein System ausgewählt</div>
        </div>
      </div>

    </div>
  </div>

</div><!-- .mdt -->

<script>
// ── STATE ─────────────────────────────────────────────────────────
let systems       = [];
let selectedSys   = null;
let activeTab     = 'devices';

// ── CONSTANTS ─────────────────────────────────────────────────────
const DTYPES = {
  panel: { label: 'ZENTRALE',        cls: 'tb-panel'  },
  smoke: { label: 'RAUCHMELDER',     cls: 'tb-smoke'  },
  pull:  { label: 'HANDFEUERMELDER', cls: 'tb-pull'   },
  siren: { label: 'SIRENE',          cls: 'tb-siren'  },
};

const TICONS  = { manual: '👤', automatic: '🤖', test: '🔧' };
const TLABELS = { manual: 'MANUELL', automatic: 'AUTOMATISCH', test: 'PROBEALARM' };
const TLCLS   = { manual: 'lt-manual', automatic: 'lt-automatic', test: 'lt-test' };

// ── CLOCK ─────────────────────────────────────────────────────────
function tickClock() {
  const n = new Date();
  const p = v => String(v).padStart(2,'0');
  document.getElementById('clock').textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}
setInterval(tickClock, 1000);
tickClock();

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hClass(h) { return h >= 75 ? 'hc-good' : h >= 30 ? 'hc-warn' : 'hc-danger'; }
function hColor(h) {
  return h >= 75 ? 'var(--normal)' : h >= 30 ? 'var(--trouble)' : 'var(--alarm)';
}

function fmtDate(str) {
  if (!str) return '—';
  try {
    const d = new Date(str.replace(' ','T'));
    return d.toLocaleString('de-DE', {
      day:'2-digit', month:'2-digit', year:'2-digit',
      hour:'2-digit', minute:'2-digit'
    });
  } catch { return str; }
}

function statusInfo(s) {
  if (s === 'alarm')   return { text:'ALARM',   cls:'alarm'  };
  if (s === 'trouble') return { text:'STÖRUNG', cls:'trouble'};
  return { text:'NORMAL', cls:'normal' };
}

// ── RENDER SYSTEM LIST ────────────────────────────────────────────
function renderSysList() {
  const list = document.getElementById('systems-list');
  document.getElementById('sys-count').textContent = systems.length;

  list.innerHTML = systems.map(sys => {
    const si   = statusInfo(sys.status);
    const act  = selectedSys && selectedSys.id === sys.id;
    const dCnt = (sys.devices || []).length;
    const low  = (sys.devices || []).filter(d => (d.health ?? 100) < 30).length;

    return `<div class="system-item s-${sys.status}${act ? ' active' : ''}"
                 onclick="selectSystem(${sys.id})">
      <div class="s-dot ${sys.status}"></div>
      <div class="sys-item-info">
        <div class="sys-item-name">${esc(sys.name)}</div>
        <div class="sys-item-meta">${dCnt} Geräte${low > 0 ? ` &nbsp;·&nbsp; ⚠ ${low}` : ''}</div>
      </div>
      <div class="s-badge ${si.cls}">${si.text}</div>
    </div>`;
  }).join('');
}

// ── SELECT SYSTEM ─────────────────────────────────────────────────
function selectSystem(id) {
  selectedSys = systems.find(s => s.id === id) || null;
  renderSysList();
  renderDetailHeader();
  renderActivePane();
}

function renderDetailHeader() {
  const si   = selectedSys ? statusInfo(selectedSys.status) : null;
  const name = document.getElementById('d-name');
  const id_  = document.getElementById('d-id');
  const bdg  = document.getElementById('d-badge');
  const btn  = document.getElementById('btn-quitt');

  if (!selectedSys) {
    name.textContent = 'Kein System ausgewählt';
    id_.textContent  = '— Links ein System wählen —';
    bdg.textContent  = '';
    bdg.style.cssText = '';
    btn.classList.remove('show');
    return;
  }

  name.textContent = selectedSys.name;
  id_.textContent  = `SYSTEM #${selectedSys.id}`;
  bdg.textContent  = si.text;
  bdg.style.cssText = `background:var(--${si.cls}-dim);color:var(--${si.cls});border-color:var(--${si.cls});`;

  btn.classList.toggle('show', selectedSys.status === 'alarm');
}

// ── DEVICES PANE ──────────────────────────────────────────────────
function renderDevices() {
  const pane = document.getElementById('pane-devices');
  if (!selectedSys) {
    pane.innerHTML = emptyHtml('🖥', 'Kein System ausgewählt');
    return;
  }

  const devs = selectedSys.devices || [];
  if (devs.length === 0) {
    pane.innerHTML = emptyHtml('📭', 'Keine Geräte verbunden');
    return;
  }

  // Stats
  const avgH  = Math.round(devs.reduce((a,d)=>a+(d.health??100),0) / devs.length);
  const low   = devs.filter(d=>(d.health??100) < 30).length;
  const typeCnt = {};
  devs.forEach(d => typeCnt[d.type] = (typeCnt[d.type]||0)+1);

  const extraStats = Object.entries(typeCnt).map(([t,c]) =>
    `<div class="stat-cell">
      <div class="stat-val">${c}</div>
      <div class="stat-key">${(DTYPES[t]?.label||t).split(' ')[0]}</div>
    </div>`
  ).join('');

  const stats = `
    <div class="stats-bar">
      <div class="stat-cell">
        <div class="stat-val">${devs.length}</div>
        <div class="stat-key">Gesamt</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" style="color:${hColor(avgH)}">${avgH}%</div>
        <div class="stat-key">⌀ Health</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" style="color:${low>0?'var(--alarm)':'var(--normal)'}">${low}</div>
        <div class="stat-key">Defekt</div>
      </div>
      ${extraStats}
    </div>`;

  const cards = devs.map(dev => {
    const h   = dev.health ?? 100;
    const dt  = DTYPES[dev.type] || { label: dev.type.toUpperCase(), cls: 'tb-panel' };
    return `
      <div class="device-card" data-did="${dev.id}">
        <div class="device-card-top">
          <span class="type-badge ${dt.cls}">${dt.label}</span>
          <span class="device-health-pct" style="color:${hColor(h)}">${h}%</span>
        </div>
        <div class="device-zone">${esc(dev.zone || 'Unbekannte Zone')}</div>
        <div class="hbar-track">
          <div class="hbar-fill ${hClass(h)}" style="width:${h}%"></div>
        </div>
        <div class="device-svc">Letzte Wartung: ${fmtDate(dev.last_service)}</div>
      </div>`;
  }).join('');

  pane.innerHTML = stats + `<div class="devices-grid">${cards}</div>`;
}

// ── LOG PANE ──────────────────────────────────────────────────────
function renderLog() {
  const pane = document.getElementById('pane-logs');
  if (!selectedSys) {
    pane.innerHTML = emptyHtml('📋', 'Kein System ausgewählt');
    return;
  }

  const logs = selectedSys.logs || [];
  if (logs.length === 0) {
    pane.innerHTML = emptyHtml('📋', 'Keine Log-Einträge vorhanden');
    return;
  }

  pane.innerHTML = `<div class="log-list">${logs.map(e => {
    const acked = !!e.acknowledged_by;
    return `
      <div class="log-entry">
        <div class="log-icon">${TICONS[e.trigger_type] || '❓'}</div>
        <div>
          <div class="log-zone">${esc(e.zone)}</div>
          <div class="log-meta">
            <span class="log-type ${TLCLS[e.trigger_type] || ''}">${TLABELS[e.trigger_type] || e.trigger_type}</span>
            <span class="log-ack ${acked ? 'acked' : ''}">
              ${acked ? '✅ ' + esc(e.acknowledged_by) : '❌ Nicht quittiert'}
            </span>
          </div>
        </div>
        <div class="log-time">${fmtDate(e.triggered_at)}</div>
      </div>`;
  }).join('')}</div>`;
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('pane-devices').classList.toggle('hidden', tab !== 'devices');
  document.getElementById('pane-logs').classList.toggle('hidden', tab !== 'logs');
  document.getElementById('tb-devices').classList.toggle('active', tab === 'devices');
  document.getElementById('tb-logs').classList.toggle('active', tab === 'logs');
  renderActivePane();
}

function renderActivePane() {
  if (activeTab === 'devices') renderDevices();
  else renderLog();
}

function emptyHtml(icon, text) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-label">${text}</div></div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────
function doQuittieren() {
  if (!selectedSys) return;
  nui('mdt_quittieren', { systemId: selectedSys.id });
}

function doRefresh() {
  nui('mdt_refresh', {});
}

function closeMDT() {
  document.getElementById('body').classList.remove('visible');
  nui('mdt_close', {});
}

function nui(cb, data) {
  fetch(`https://d4rk_firealert/${cb}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
}

// ── NUI MESSAGES FROM LUA ─────────────────────────────────────────
window.addEventListener('message', ({ data: msg }) => {
  if (!msg || !msg.type) return;

  if (msg.type === 'open') {
    systems = msg.data || [];
    // Gewähltes System nach Refresh aktuell halten
    if (selectedSys) {
      selectedSys = systems.find(s => s.id === selectedSys.id) || null;
    }
    renderSysList();
    renderDetailHeader();
    renderActivePane();
    document.getElementById('body').classList.add('visible');

  } else if (msg.type === 'updateStatus') {
    const sys = systems.find(s => s.id == msg.systemId);
    if (sys) {
      sys.status = msg.status;
      if (selectedSys && selectedSys.id == msg.systemId) {
        selectedSys.status = msg.status;
        renderDetailHeader();
      }
      renderSysList();
    }

  } else if (msg.type === 'updateHealth') {
    outer: for (const sys of systems) {
      const dev = (sys.devices || []).find(d => d.id == msg.deviceId);
      if (dev) {
        dev.health = msg.health;
        if (selectedSys && selectedSys.id === sys.id && activeTab === 'devices') {
          // Nur die betroffene Karte aktualisieren — kein kompletter Re-Render
          const card = document.querySelector(`[data-did="${msg.deviceId}"]`);
          if (card) {
            const fill = card.querySelector('.hbar-fill');
            const pct  = card.querySelector('.device-health-pct');
            if (fill) { fill.style.width = msg.health + '%'; fill.className = `hbar-fill ${hClass(msg.health)}`; }
            if (pct)  { pct.textContent = msg.health + '%'; pct.style.color = hColor(msg.health); }
          }
        }
        break outer;
      }
    }
  }
});

// ESC schließt MDT
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMDT(); });
</script>
</body>
